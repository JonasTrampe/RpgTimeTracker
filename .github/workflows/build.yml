name: Build

# Plain compile check (both apps + Shared), on both supported operating
# systems (see README "Requirements") - no publish/release artifact, see
# release.yml for that. The RpgTimeTracker.Tests unit tests run as their
# own dedicated workflow (tests.yml), not a step here, so a broken test
# shows up as its own check/status badge distinct from "does it compile".
# LibVLCSharp/VideoLAN.LibVLC.Windows don't need a system-installed VLC
# library for this: the native Windows DLL comes bundled as a NuGet package
# (referenced only on Windows, see the csproj condition), and the rest is
# pure managed binding that only needs an installed VLC at runtime, not to
# build.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore RpgTimeTracker.sln

      - name: Build (Release)
        run: dotnet build RpgTimeTracker.sln -c Release --no-restore
