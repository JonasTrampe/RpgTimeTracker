name: Build

# Reiner Kompilier-Check auf beiden unterstützten Betriebssystemen (siehe
# README "Voraussetzungen") - kein Publish/Release-Artefakt, nur "baut es
# noch". LibVLCSharp/VideoLAN.LibVLC.Windows brauchen dafür keine
# system-installierte VLC-Bibliothek: die native Windows-DLL kommt als
# NuGet-Paket mit (nur unter Windows referenziert, siehe csproj-Condition),
# und der Rest ist reines Managed-Binding, das erst zur Laufzeit ein
# installiertes VLC braucht, nicht zum Bauen.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore RpgTimeTracker.sln

      - name: Build (Release)
        run: dotnet build RpgTimeTracker.sln -c Release --no-restore
