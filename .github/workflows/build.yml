name: Build

# Compile check plus the RpgTimeTracker.Tests unit tests, on both supported
# operating systems (see README "Requirements") - no publish/release
# artifact, see release.yml for that. LibVLCSharp/VideoLAN.LibVLC.Windows
# don't need a system-installed VLC library for this: the native Windows DLL
# comes bundled as a NuGet package (referenced only on Windows, see the
# csproj condition), and the rest is pure managed binding that only needs an
# installed VLC at runtime, not to build.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore RpgTimeTracker.sln

      - name: Build (Release)
        run: dotnet build RpgTimeTracker.sln -c Release --no-restore

      - name: Test
        run: dotnet test RpgTimeTracker.Tests/RpgTimeTracker.Tests.csproj -c Release --no-build
