name: Docs

# Builds the Sphinx user-docs site (docs/) and publishes it to GitHub
# Pages via the official Pages Actions (configure-pages/upload-pages-
# artifact/deploy-pages), not the classic peaceiris/actions-gh-pages
# branch-push approach - no gh-pages branch to keep around. Only
# triggers on changes under docs/, mirroring build.yml/tests.yml's
# path-scoping convention. Repo Settings -> Pages -> Source must be set
# to "GitHub Actions" once for the deploy job to actually publish.
on:
  push:
    branches: [ main ]
    paths: [ 'docs/**' ]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Sphinx + theme
        run: pip install -r docs/requirements.txt

      - name: Build site
        run: sphinx-build -b html docs docs/_build/html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
